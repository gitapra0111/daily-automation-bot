name: Bot Laporan Bulanan (PDF)

# Kapan bot ini berjalan?
on:
  schedule:
    # Berjalan pada tanggal 28 setiap bulan, jam 08:00 WIB (01:00 UTC)
    - cron: '0 1 28 * *'
  workflow_dispatch: # Tombol manual untuk testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas requests python-dotenv

      - name: Jalankan Bot PDF Headless
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Pastikan path ini menunjuk ke lokasi file barumu dengan benar
        run: python Learn-5_Dynamic_Scraping/scheduled_pdf_bot.py
